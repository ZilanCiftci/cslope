<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cSlope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1e1e1e;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      animation: fadeIn 0.4s ease-out;
    }
    .app-name {
      font-size: 28px;
      font-weight: 600;
      color: #e8e8e8;
      letter-spacing: 1px;
      animation: fadeIn 0.4s ease-out 0.1s both;
    }
    .tagline {
      font-size: 12px;
      color: #858585;
      animation: fadeIn 0.4s ease-out 0.2s both;
    }
    .loader {
      margin-top: 16px;
      width: 120px;
      height: 2px;
      background: #3c3c3c;
      border-radius: 1px;
      overflow: hidden;
      animation: fadeIn 0.4s ease-out 0.3s both;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: #0078d4;
      border-radius: 1px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <defs>
        <clipPath id="cc">
          <circle cx="12" cy="12" r="11"/>
        </clipPath>
      </defs>
      <circle cx="12" cy="12" r="11" stroke="#f8fafc" stroke-width="1.5"/>
      <path d="M0 8h2.5h6l8 8h5H24V24H0Z" fill="#a08060" fill-opacity="0.25" stroke="none" clip-path="url(#cc)"/>
      <path d="M5 8A9 9 0 0 0 17 16" stroke="#ef4444" stroke-width="1.3"/>
      <path d="M2.5 8h6l8 8h5" stroke="#f8fafc" stroke-width="2.0"/>
    </svg>
    <div class="app-name">cSlope</div>
    <div class="tagline">Slope Stability Analysis</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
